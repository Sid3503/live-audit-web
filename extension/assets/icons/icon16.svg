<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Background -->
  <rect width="16" height="16" rx="3" fill="#4f46e5"/>

  <!-- Magnifying glass lens -->
  <circle cx="6.5" cy="6.5" r="3.8" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- Magnifying glass handle -->
  <line x1="9.2" y1="9.2" x2="13" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Two journey nodes (16px is too small for 3) -->
  <circle cx="4.8" cy="7.5" r="1" fill="white"/>
  <circle cx="8" cy="4.5" r="1" fill="white"/>
  <line x1="4.8" y1="7.5" x2="8" y2="4.5" stroke="white" stroke-width="1" opacity="0.7"/>
</svg>
